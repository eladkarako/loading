<!DOCTYPE html>
<html encoding="UTF-8" charset="UTF-8" dir="ltr" lang="en-US" xml:lang="en-US" language="English" itemscope="" itemtype="http://schema.org/WebPage" prefix="og: http://ogp.me/ns# article: http://ogp.me/ns/article#">
<head>
  <meta charset="UTF-8"                                                               />
  <meta name="viewport"                                content="width=device-width"   />
  <link rel="preload" as="image"     href="index.svg"                                 />  
  <link rel="stylesheet" media="all" href="index.css" type="text/css" charset="UTF-8" />
  <link rel="icon"          href="favicon.ico" type="image/x-icon"                    />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon"                    />
  <meta name="theme-color"                             content="#ADD8E6"              />
  <meta name="apple-mobile-web-app-capable"            content="yes"                  />
  <meta name="apple-mobile-web-app-status-bar-style"   content="translucent blue"     />
  <meta name="msapplication-navbutton-color"           content="translucent blue"     />
  <title>loading</title>
</head>
<body role="main">
<svg viewBox="0 0 200 200" width="min(90vmin, 520px)" height="min(90vmin, 520px)" role="img" aria-label="light-blue circle animation">
  <metadata>
    <custom>
      <version>26.06.27.1742</version>
      <author>Elad Karako</author>
      <license>MIT</license>
    </custom>
  </metadata>
  <title>light-blue circle animation</title>
  <desc>a light-blue circle animation, where the circle gets increased in size for 3 seconds and 500 milliseconds, then decreased in size for 3 seconds and 500 milliseconds, total of 7 seconds for the whole animation. eased in and out. animation usually used for page-loading, or practicing breathing, similar to 'Wim Hof Method'.</desc>
  <style>
    svg { 
      background : transparent;
      fill       : none;
    }
    .pulseCircle{
      transform-origin : center;
      transform-box    : fill-box;
      transform        : scale(0.300);
      animation        : pulse 7s ease-in-out infinite alternate;
      will-change      : transform;
      fill             : lightblue;
    }
    @keyframes pulse{
      to { transform: scale(10); }
    }
  </style>
  <circle class="pulseCircle" cx="100" cy="100" r="10"></circle>
</svg>
<script src="index.js" type="text/javascript" charset="UTF-8" ></script>
</body>
</html>
